name: weekly data refresh
on:
  schedule:
    - cron: '41 3 * * 1'   # Mondays 03:41 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: pipeline/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: cut the imdb slice
        working-directory: pipeline
        run: go run . -out ../data/imdb-slice.json
      - name: refresh the syllabus (posters and crowd ratings drift)
        run: |
          # the key already ships to browsers via config.js — same key, same exposure
          export TMDB_KEY=$(node -e "import('./assets/config.js').then(c => console.log(c.TMDB_KEY))")
          node tools/make-syllabus.mjs
      - name: commit if changed
        run: |
          git add data/imdb-slice.json data/syllabus.json
          if ! git diff --cached --quiet; then
            git config user.name "projectionist"
            git config user.email "actions@users.noreply.github.com"
            git commit -m "Weekly data refresh"
            git push
          else
            echo "nothing changed"
          fi
