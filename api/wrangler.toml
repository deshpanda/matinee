# Matinée edge worker — deploy with `npx wrangler deploy` from api/.
# One secret: `npx wrangler secret put TMDB_KEY`
name = "matinee-api"
main = "build/worker/shim.mjs"
compatibility_date = "2026-07-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

[vars]
ACCOUNT_ID = "d7c14e4d5bcf1d69993b6631572c3991"

[[kv_namespaces]]
binding = "COUNTERS"
id = "9477fc8c0ff043289ab238c17e49659e"
